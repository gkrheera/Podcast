<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Link Studio | AI Rehearsal</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & Babel -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #020617; }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
        .animate-float { animation: float 6s ease-in-out infinite; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // --- INLINE SVG ICONS ---
        const IconMic = () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" x2="12" y1="19" y2="22"/></svg>;
        const IconMicOff = () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="2" x2="22" y1="2" y2="22"/><path d="M18.89 13.23A7.12 7.12 0 0 0 19 12v-2"/><path d="M5 10v2a7 7 0 0 0 12 5"/><path d="M15 9.34V5a3 3 0 0 0-5.68-1.33"/><path d="M9 9v3a3 3 0 0 0 5.12 2.12"/><line x1="12" x2="12" y1="19" y2="22"/></svg>;
        const IconTarget = () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/></svg>;
        const IconSparkles = () => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z"/><path d="M5 3v4"/><path d="M19 17v4"/><path d="M3 5h4"/><path d="M17 19h4"/></svg>;
        const IconFileText = () => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><line x1="10" y1="9" x2="8" y2="9"/></svg>;
        const IconShare = () => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8"/><polyline points="16 6 12 2 8 6"/><line x1="12" x2="12" y1="2" y2="15"/></svg>;

        // --- SETTINGS ---
        const apiKey = "AIzaSyBuUSWvVTw6lskBPO26gkV15KmLUs7SjI4"; 
        const TEXT_MODEL = "gemini-2.5-flash-preview-09-2025";
        const IMAGE_MODEL = "imagen-4.0-generate-001";
        const TTS_MODEL = "gemini-2.5-flash-preview-tts";

        const App = () => {
            const [currentSegment, setCurrentSegment] = useState(0);
            const [isRecording, setIsRecording] = useState(false);
            const [chatHistory, setChatHistory] = useState([]);
            const [isProcessing, setIsProcessing] = useState(false);
            const [audioUrl, setAudioUrl] = useState(null);
            const [transcript, setTranscript] = useState("");
            const [aiOutput, setAiOutput] = useState(null);
            const [thumbnail, setThumbnail] = useState(null);
            
            const audioRef = useRef(null);
            const recognitionRef = useRef(null);

            // API Call with Exponential Backoff
            const callApi = async (url, payload, retries = 5) => {
                for (let i = 0; i < retries; i++) {
                    try {
                        const response = await fetch(`${url}?key=${apiKey}`, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify(payload)
                        });
                        if (response.ok) return await response.json();
                    } catch (e) {}
                    await new Promise(res => setTimeout(res, Math.pow(2, i) * 1000));
                }
                return null;
            };

            useEffect(() => {
                const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
                if (SpeechRecognition) {
                    recognitionRef.current = new SpeechRecognition();
                    recognitionRef.current.continuous = true;
                    recognitionRef.current.interimResults = true;
                    recognitionRef.current.onresult = (e) => {
                        let current = "";
                        for (let i = e.resultIndex; i < e.results.length; i++) {
                            current += e.results[i][0].transcript;
                        }
                        setTranscript(current);
                    };
                    recognitionRef.current.onend = () => setIsRecording(false);
                }
            }, []);

            const toggleRecording = () => {
                if (isRecording) {
                    recognitionRef.current?.stop();
                    if (transcript.trim()) {
                        handlePodcastLogic(transcript);
                        setTranscript("");
                    }
                } else {
                    setTranscript("");
                    recognitionRef.current?.start();
                    setIsRecording(true);
                }
            };

            const segments = [
                { title: "Opening & Introductions", time: "0-8 min", goals: "Establish Cognite and guests.", cueCards: ["Welcome to The Link...", "Introduce Bill Owen", "Introduce Guru"] },
                { title: "AI in Manufacturing", time: "8-23 min", goals: "ROI (465%) and deployment speed.", cueCards: ["7-week value benchmark", "Contextualization vs Dashboards"] },
                { title: "Technology Services", time: "23-35 min", goals: "Ideal partner profile for Smartlinks.", cueCards: ["Success vs Failure modes", "Services professional profile"] },
                { title: "India: Innovation Hub", time: "35-50 min", goals: "Bengaluru CoE as a global engine.", cueCards: ["100+ specialists", "Raisina Dialogue context"] },
                { title: "Supply Chain", time: "50-57 min", goals: "The Blue Yonder shared heritage.", cueCards: ["Shared Universe", "Post-pandemic resilience"] },
                { title: "Closing Vision", time: "57-60 min", goals: "Bold actionable advice.", cueCards: ["5-year picture", "Final advice"] }
            ];

            const handlePodcastLogic = async (userText) => {
                setIsProcessing(true);
                const sysPrompt = `Roleplay GURU and BILL on 'The Link'. Four-Part Response: 1. GUEST ANSWERS, 2. PACING NOTE, 3. PROBE SUGGESTION, 4. HOST COACHING. Segment: ${segments[currentSegment].title}. Bill is global/ROI focused. Guru is technical/India-proud.`;
                
                const data = await callApi(`https://generativelanguage.googleapis.com/v1beta/models/${TEXT_MODEL}:generateContent`, {
                    contents: [{ parts: [{ text: `Host says: ${userText}` }] }],
                    systemInstruction: { parts: [{ text: sysPrompt }] }
                });

                if (data) {
                    const result = data.candidates?.[0]?.content?.parts?.[0]?.text;
                    setChatHistory(prev => [...prev, { role: 'host', text: userText }, { role: 'coach', text: result }]);
                    const dialogue = result.split("2. PACING NOTE")[0].replace("1. GUEST ANSWER(S)", "").trim();
                    generateTTS(dialogue);
                }
                setIsProcessing(false);
            };

            const generateTTS = async (text) => {
                const voice = text.includes("🔵 Bill") ? "Charon" : "Kore";
                const data = await callApi(`https://generativelanguage.googleapis.com/v1beta/models/${TTS_MODEL}:generateContent`, {
                    contents: [{ parts: [{ text: `Speak naturally: ${text}` }] }],
                    generationConfig: { responseModalities: ["AUDIO"], speechConfig: { voiceConfig: { prebuiltVoiceConfig: { voiceName: voice } } } }
                });

                if (data?.candidates?.[0]?.content?.parts?.[0]?.inlineData?.data) {
                    const pcm = data.candidates[0].content.parts[0].inlineData.data;
                    const buffer = Uint8Array.from(atob(pcm), c => c.charCodeAt(0)).buffer;
                    const wav = new ArrayBuffer(44 + buffer.byteLength);
                    const view = new DataView(wav);
                    const s = (o, str) => { for (let i = 0; i < str.length; i++) view.setUint8(o + i, str.charCodeAt(i)); };
                    s(0, 'RIFF'); view.setUint32(4, 36 + buffer.byteLength, true); s(8, 'WAVE'); s(12, 'fmt ');
                    view.setUint32(16, 16, true); view.setUint16(20, 1, true); view.setUint16(22, 1, true);
                    view.setUint32(24, 24000, true); view.setUint32(28, 48000, true);
                    view.setUint16(32, 2, true); view.setUint16(34, 16, true); s(36, 'data'); view.setUint32(40, buffer.byteLength, true);
                    new Uint8Array(wav, 44).set(new Uint8Array(buffer));
                    setAudioUrl(URL.createObjectURL(new Blob([wav], { type: 'audio/wav' })));
                }
            };

            // ✨ FEATURE: Smart Follow-up lab
            const generateSmartProbes = async () => {
                if (chatHistory.length === 0) return;
                setIsProcessing(true);
                const lastResponse = chatHistory[chatHistory.length - 1].text;
                const data = await callApi(`https://generativelanguage.googleapis.com/v1beta/models/${TEXT_MODEL}:generateContent`, {
                    contents: [{ parts: [{ text: `Analyze this guest response and suggest 3 high-impact follow-up questions for the host: ${lastResponse}` }] }]
                });
                if (data) setAiOutput({ title: "Smart Probes", content: data.candidates[0].content.parts[0].text });
                setIsProcessing(false);
            };

            // ✨ FEATURE: Outro Drafter
            const draftOutro = async () => {
                setIsProcessing(true);
                const hist = chatHistory.map(h => `${h.role}: ${h.text}`).join("\n");
                const data = await callApi(`https://generativelanguage.googleapis.com/v1beta/models/${TEXT_MODEL}:generateContent`, {
                    contents: [{ parts: [{ text: `Based on this rehearsal history, draft a personalized 90-second outro for Heera (Host) referencing specific insights from Bill and Guru: ${hist}` }] }]
                });
                if (data) setAiOutput({ title: "Custom Outro Script", content: data.candidates[0].content.parts[0].text });
                setIsProcessing(false);
            };

            // ✨ FEATURE: LinkedIn Kit
            const draftSocialKit = async () => {
                setIsProcessing(true);
                const hist = chatHistory.map(h => `${h.role}: ${h.text}`).join("\n");
                const data = await callApi(`https://generativelanguage.googleapis.com/v1beta/models/${TEXT_MODEL}:generateContent`, {
                    contents: [{ parts: [{ text: `Create a LinkedIn post draft for the host based on this conversation history. Use hashtags #IndustrialAI #Smartlinks: ${hist}` }] }]
                });
                if (data) setAiOutput({ title: "Social Media Kit", content: data.candidates[0].content.parts[0].text });
                setIsProcessing(false);
            };

            // ✨ FEATURE: Visual Atmosphere (Imagen)
            const updateAtmosphere = async () => {
                setIsProcessing(true);
                const data = await callApi(`https://generativelanguage.googleapis.com/v1beta/models/${IMAGE_MODEL}:predict`, {
                    instances: { prompt: `Cinematic professional podcast studio background, industrial theme, blue data streams, high quality 4k` },
                    parameters: { sampleCount: 1 }
                });
                if (data?.predictions?.[0]?.bytesBase64Encoded) {
                    setThumbnail(`data:image/png;base64,${data.predictions[0].bytesBase64Encoded}`);
                }
                setIsProcessing(false);
            };

            return (
                <div className="flex flex-col h-screen bg-[#020617] text-slate-100 overflow-hidden relative">
                    {thumbnail && (
                        <div className="absolute inset-0 z-0 opacity-10">
                            <img src={thumbnail} className="w-full h-full object-cover" />
                        </div>
                    )}
                    
                    <header className="flex items-center justify-between px-8 py-4 bg-slate-900/80 border-b border-slate-800 backdrop-blur-xl z-20">
                        <div className="flex items-center gap-4">
                            <div className="w-10 h-10 bg-indigo-600 rounded-xl flex items-center justify-center shadow-lg"><IconTarget /></div>
                            <div>
                                <h1 className="font-black text-lg tracking-tighter uppercase italic leading-none">The Link Studio</h1>
                                <div className="text-[9px] font-bold text-indigo-400 tracking-widest mt-1">AI PRODUCTION ACTIVE</div>
                            </div>
                        </div>
                        <div className="flex gap-4">
                             <button onClick={updateAtmosphere} className="p-2 bg-slate-800 rounded-lg hover:bg-slate-700 transition-all"><IconSparkles /></button>
                             <div className="bg-black/40 border border-slate-800 px-4 py-2 rounded-full text-xs font-bold text-indigo-400">
                                Segment {currentSegment + 1}
                             </div>
                        </div>
                    </header>

                    <main className="flex flex-1 overflow-hidden relative z-10">
                        <aside className="w-80 border-r border-slate-800 bg-[#0f172a]/90 p-6 flex flex-col gap-6 overflow-y-auto">
                            <div className="p-4 bg-slate-900 rounded-2xl border border-slate-800">
                                <h3 className="font-bold text-sm text-white mb-2">{segments[currentSegment].title}</h3>
                                <p className="text-xs text-slate-400 italic">"{segments[currentSegment].goals}"</p>
                            </div>
                            <div className="space-y-3">
                                {segments[currentSegment].cueCards.map((c, i) => (
                                    <div key={i} className="p-4 bg-slate-800/40 rounded-xl border border-slate-700 text-xs font-medium text-slate-300">{c}</div>
                                ))}
                            </div>
                            <div className="mt-auto flex gap-2">
                                <button onClick={() => setCurrentSegment(s => Math.max(0, s-1))} className="flex-1 p-3 bg-slate-800 rounded-xl">Prev</button>
                                <button onClick={() => setCurrentSegment(s => Math.min(5, s+1))} className="flex-1 p-3 bg-slate-800 rounded-xl">Next</button>
                            </div>
                        </aside>

                        <section className="flex-1 flex flex-col bg-black/40">
                            <div className="flex-1 overflow-y-auto p-12 space-y-10 custom-scrollbar">
                                {chatHistory.length === 0 && (
                                    <div className="h-full flex flex-col items-center justify-center opacity-50 text-center animate-float">
                                        <div className="w-24 h-24 bg-indigo-600 rounded-full flex items-center justify-center mb-8 shadow-2xl"><IconMic /></div>
                                        <h2 className="text-2xl font-black uppercase italic">Mic Check, Heera</h2>
                                        <p className="text-sm">Start your intro whenever the cameras are ready.</p>
                                    </div>
                                )}
                                {chatHistory.map((m, i) => (
                                    <div key={i} className={`flex ${m.role === 'host' ? 'justify-end' : 'justify-start'}`}>
                                        <div className={`max-w-2xl p-6 rounded-3xl ${m.role === 'host' ? 'bg-indigo-600 rounded-tr-none' : 'bg-slate-900 border border-slate-800 rounded-tl-none'}`}>
                                            <div className="text-[9px] font-black opacity-50 mb-2 uppercase">{m.role === 'host' ? 'Host' : 'Guests'}</div>
                                            <div className="text-sm leading-relaxed whitespace-pre-wrap">{m.text}</div>
                                        </div>
                                    </div>
                                ))}
                                {isProcessing && <div className="text-indigo-400 text-[10px] font-black uppercase text-center tracking-widest animate-pulse">✨ AI processing conversation...</div>}
                            </div>

                            <audio ref={audioRef} src={audioUrl} autoPlay />

                            <div className="p-8 bg-slate-950/80 border-t border-slate-900 backdrop-blur-md">
                                <div className="max-w-4xl mx-auto flex flex-col items-center gap-6">
                                    <div className="flex gap-4">
                                        <button onClick={generateSmartProbes} title="✨ AI Probing Lab" className="w-12 h-12 bg-slate-800 rounded-full flex items-center justify-center hover:bg-slate-700 transition-all text-indigo-400 shadow-xl border border-slate-700">
                                            <IconSparkles />
                                        </button>
                                        <button onClick={toggleRecording} className={`w-20 h-20 rounded-full flex items-center justify-center shadow-2xl transition-all relative ${isRecording ? 'bg-red-500 scale-110' : 'bg-indigo-600'}`}>
                                            {isRecording ? <IconMicOff /> : <IconMic />}
                                        </button>
                                        <button onClick={draftOutro} title="✨ Draft Outro" className="w-12 h-12 bg-slate-800 rounded-full flex items-center justify-center hover:bg-slate-700 transition-all text-indigo-400 shadow-xl border border-slate-700">
                                            <IconFileText />
                                        </button>
                                    </div>
                                    <div className="text-[11px] font-bold text-slate-500 uppercase tracking-widest text-center italic min-h-[1em]">
                                        {transcript || (isRecording ? "Listening..." : "Ready for rehearsal")}
                                    </div>
                                </div>
                            </div>
                        </section>

                        <aside className="w-80 border-l border-slate-800 bg-[#0f172a]/90 p-8 space-y-8 overflow-y-auto">
                            <h2 className="text-[10px] font-black text-amber-500 uppercase tracking-widest flex items-center gap-2"><IconSparkles /> AI Production Lab</h2>
                            {!aiOutput ? (
                                <div className="p-5 border border-slate-800 rounded-2xl text-center opacity-40">
                                    <p className="text-[10px] uppercase font-black">No output yet</p>
                                    <p className="text-[10px] mt-2">Use the ✨ buttons to generate probes or scripts.</p>
                                </div>
                            ) : (
                                <div className="space-y-4 animate-in slide-in-from-right duration-500">
                                    <div className="p-5 bg-indigo-500/5 border border-indigo-500/20 rounded-2xl relative">
                                        <button onClick={() => setAiOutput(null)} className="absolute top-2 right-2 text-slate-500 hover:text-white text-[10px]">Close</button>
                                        <p className="text-[10px] font-black text-indigo-400 uppercase mb-3">{aiOutput.title}</p>
                                        <div className="text-xs text-slate-300 leading-relaxed font-medium max-h-96 overflow-y-auto custom-scrollbar pr-2 whitespace-pre-wrap">{aiOutput.content}</div>
                                    </div>
                                    {aiOutput.title === "Custom Outro Script" && (
                                        <button onClick={draftSocialKit} className="w-full py-3 bg-indigo-600 rounded-xl text-[10px] font-black uppercase flex items-center justify-center gap-2 hover:bg-indigo-500 transition-all">
                                            <IconShare /> ✨ Generate Social Media Kit
                                        </button>
                                    )}
                                </div>
                            )}
                            
                            <div className="p-5 bg-slate-900/50 rounded-2xl border border-slate-800">
                                <p className="text-[9px] font-black text-slate-500 uppercase mb-4 tracking-widest">Guest Audio Feed</p>
                                <div className="space-y-4">
                                    <div className="flex items-center justify-between">
                                        <span className="text-[10px] font-bold text-slate-400">Bill (CSO)</span>
                                        <div className={`w-2 h-2 rounded-full ${audioUrl && chatHistory.length % 2 === 0 ? 'bg-green-500 shadow-[0_0_10px_green]' : 'bg-slate-800'}`} />
                                    </div>
                                    <div className="flex items-center justify-between">
                                        <span className="text-[10px] font-bold text-slate-400">Guru (India)</span>
                                        <div className={`w-2 h-2 rounded-full ${audioUrl && chatHistory.length % 2 !== 0 ? 'bg-green-500 shadow-[0_0_10px_green]' : 'bg-slate-800'}`} />
                                    </div>
                                </div>
                            </div>
                        </aside>
                    </main>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
