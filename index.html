<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Link Studio | Rehearsal AI</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & Babel -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #020617; }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;
        
        // Icons from Lucide (Mocking standard Lucide-react for browser)
        const Icon = ({ name, size = 24, className = "" }) => {
            const [svg, setSvg] = useState("");
            useEffect(() => {
                const icon = lucide.icons[name];
                if (icon) {
                    const svgString = lucide.createIcons({ icons: { [name]: icon } });
                    // Manual fallback for this environment
                }
            }, [name]);
            return <i data-lucide={name} className={className} style={{ width: size, height: size }}></i>;
        };

        // Standard Lucide icons available via CDN globally
        const Mic = () => <i data-lucide="mic"></i>;
        const MicOff = () => <i data-lucide="mic-off"></i>;
        const ChevronRight = () => <i data-lucide="chevron-right"></i>;
        const ChevronLeft = () => <i data-lucide="chevron-left"></i>;
        const Volume2 = () => <i data-lucide="volume-2"></i>;
        const Target = () => <i data-lucide="target"></i>;
        const Zap = () => <i data-lucide="zap"></i>;
        const MessageSquare = () => <i data-lucide="message-square"></i>;
        const RotateCcw = () => <i data-lucide="rotate-ccw"></i>;
        const PlayCircle = () => <i data-lucide="play-circle"></i>;
        const Sparkles = () => <i data-lucide="sparkles"></i>;
        const FileText = () => <i data-lucide="file-text"></i>;
        const Share2 = () => <i data-lucide="share-2"></i>;
        const Command = () => <i data-lucide="command"></i>;
        const ImageIcon = () => <i data-lucide="image"></i>;
        const Loader2 = ({ className }) => <i data-lucide="loader-2" className={className}></i>;

        const apiKey = "AIzaSyBuUSWvVTw6lskBPO26gkV15KmLUs7SjI4"; // IMPORTANT: Enter your Gemini API key here or use env vars
        const TEXT_MODEL = "gemini-2.5-flash-preview-09-2025";
        const IMAGE_MODEL = "imagen-4.0-generate-001";
        const TTS_MODEL = "gemini-2.5-flash-preview-tts";

        const App = () => {
            const [currentSegment, setCurrentSegment] = useState(0);
            const [isRecording, setIsRecording] = useState(false);
            const [chatHistory, setChatHistory] = useState([]);
            const [isProcessing, setIsProcessing] = useState(false);
            const [audioUrl, setAudioUrl] = useState(null);
            const [performanceMode, setPerformanceMode] = useState(false);
            const [transcript, setTranscript] = useState("");
            const [aiReport, setAiReport] = useState(null);
            const [isGeneratingExtra, setIsGeneratingExtra] = useState(false);
            const [podcastThumbnail, setPodcastThumbnail] = useState(null);
            
            const audioRef = useRef(null);
            const recognitionRef = useRef(null);

            useEffect(() => {
                lucide.createIcons();
            });

            useEffect(() => {
                const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
                if (SpeechRecognition) {
                    recognitionRef.current = new SpeechRecognition();
                    recognitionRef.current.continuous = true;
                    recognitionRef.current.interimResults = true;
                    recognitionRef.current.onresult = (e) => {
                        let current = "";
                        for (let i = e.resultIndex; i < e.results.length; i++) {
                            current += e.results[i][0].transcript;
                        }
                        setTranscript(current);
                    };
                    recognitionRef.current.onend = () => setIsRecording(false);
                }
            }, []);

            const toggleRecording = () => {
                if (isRecording) {
                    recognitionRef.current?.stop();
                    if (transcript.trim()) {
                        callGemini(transcript);
                        setTranscript("");
                    }
                } else {
                    setTranscript("");
                    recognitionRef.current?.start();
                    setIsRecording(true);
                }
            };

            const segments = [
                { title: "Opening & Introductions", time: "0-8 min", goals: "Warm, welcoming. Establish Cognite and guests.", cueCards: ["Welcome to The Link...", "Introduce Bill Owen (CSO)", "Introduce Guru (MD India)", "Establish 'Shared Universe'"], questions: ["Q1: Simplest description of Cognite?", "Q2 (Bill): Why Cognite after 30 years?", "Q3 (Guru): The thread from Hyundai to AI?"] },
                { title: "AI in Manufacturing", time: "8-23 min", goals: "Meaty technical segment. Focus on ROI and impact.", cueCards: ["465% ROI (Forrester)", "7-week deployment time", "Industrial DataOps concept"], questions: ["Q4: What's holding companies back?", "Q5: How to hit impact in 7 weeks?", "Q6: Predict vs Act (Atlas AI)"] },
                { title: "Technology Services", time: "23-35 min", goals: "Strategic for Smartlinks. Partner ecosystem focus.", cueCards: ["SI Partner Profile", "Managed Services vs Software", "Deployment failure modes"], questions: ["Q9: Where do deployments go wrong?", "Q12: What does a good partner look like?"] },
                { title: "India: Innovation Hub", time: "35-50 min", goals: "Bengaluru CoE. India as global innovation engine.", cueCards: ["100+ specialists in Bengaluru", "Raisina Dialogue context", "Bridge between tech/silos"], questions: ["Q13: Why Bengaluru CoE?", "Q14: AI as the bridge?"] },
                { title: "Supply Chain Thread", time: "50-57 min", goals: "The Blue Yonder shared history. OT vs Supply Chain.", cueCards: ["Shared Ancestry (BY)", "Resilience after pandemic", "PM GatiShakti"], questions: ["Q18: How Industrial AI changes SC?", "Q19: Can AI genuinely fix fragility?"] },
                { title: "Closing & Vision", time: "57-60 min", goals: "Bold close. Actionable advice.", cueCards: ["5-year factory vision", "Advice for leaders", "Personal Callback"], questions: ["Q21: Paint the 5-year picture.", "Q22: Final piece of advice."] }
            ];

            const geminiFetch = async (prompt, systemPrompt = "", retryCount = 0) => {
                if (!apiKey) return "Error: API Key missing. Please provide a Gemini API key.";
                try {
                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${TEXT_MODEL}:generateContent?key=${apiKey}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{ parts: [{ text: prompt }] }],
                            systemInstruction: systemPrompt ? { parts: [{ text: systemPrompt }] } : undefined
                        })
                    });
                    const data = await response.json();
                    return data.candidates?.[0]?.content?.parts?.[0]?.text;
                } catch (error) { return null; }
            };

            const callGemini = async (userText) => {
                setIsProcessing(true);
                const systemPrompt = `You are roleplaying GURU and BILL on 'The Link' podcast. Follow-up strictly with the Four-Part Response: 1. GUEST ANSWERS, 2. PACING NOTE, 3. PROBE SUGGESTION, 4. HOST COACHING. Current Segment: ${segments[currentSegment].title}.`;
                const result = await geminiFetch(`Host says: ${userText}`, systemPrompt);
                if (result) {
                    setChatHistory(prev => [...prev, { role: 'host', text: userText }, { role: 'coach', text: result }]);
                    const dialogue = result.split("2. PACING NOTE")[0].replace("1. GUEST ANSWER(S)", "").trim();
                    generateTTS(dialogue);
                }
                setIsProcessing(false);
            };

            const generateTTS = async (text) => {
                const isBill = text.includes("🔵 Bill");
                const voice = isBill ? "Charon" : "Kore";
                try {
                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${TTS_MODEL}:generateContent?key=${apiKey}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{ parts: [{ text: `Speak in a natural, conversational podcast tone: ${text}` }] }],
                            generationConfig: { responseModalities: ["AUDIO"], speechConfig: { voiceConfig: { prebuiltVoiceConfig: { voiceName: voice } } } }
                        })
                    });
                    const data = await response.json();
                    const pcmData = data.candidates?.[0]?.content?.parts?.[0]?.inlineData?.data;
                    if (pcmData) {
                        const pcmBuffer = Uint8Array.from(atob(pcmData), c => c.charCodeAt(0)).buffer;
                        const wavHeader = new ArrayBuffer(44);
                        const view = new DataView(wavHeader);
                        const writeString = (offset, s) => { for (let i = 0; i < s.length; i++) view.setUint8(offset + i, s.charCodeAt(i)); };
                        writeString(0, 'RIFF'); view.setUint32(4, 36 + pcmBuffer.byteLength, true);
                        writeString(8, 'WAVE'); writeString(12, 'fmt ');
                        view.setUint32(16, 16, true); view.setUint16(20, 1, true); view.setUint16(22, 1, true);
                        view.setUint32(24, 24000, true); view.setUint32(28, 48000, true);
                        view.setUint16(32, 2, true); view.setUint16(34, 16, true);
                        writeString(36, 'data'); view.setUint32(40, pcmBuffer.byteLength, true);
                        const blob = new Blob([wavHeader, pcmBuffer], { type: 'audio/wav' });
                        setAudioUrl(URL.createObjectURL(blob));
                    }
                } catch (err) { console.error(err); }
            };

            const generateVisualTheme = async () => {
                setIsGeneratingExtra(true);
                const prompt = `A professional, cinematic podcast thumbnail for a show about Industrial AI. No text. 4k resolution.`;
                try {
                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${IMAGE_MODEL}:predict?key=${apiKey}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ instances: { prompt }, parameters: { sampleCount: 1 } })
                    });
                    const result = await response.json();
                    if (result.predictions?.[0]?.bytesBase64Encoded) {
                        setPodcastThumbnail(`data:image/png;base64,${result.predictions[0].bytesBase64Encoded}`);
                    }
                } catch (e) {}
                setIsGeneratingExtra(false);
            };

            return (
                <div className="flex flex-col h-screen bg-[#020617] text-slate-100 font-sans overflow-hidden">
                    <header className="flex items-center justify-between px-8 py-4 bg-slate-900/60 border-b border-slate-800 backdrop-blur-2xl z-20">
                        <div className="flex items-center gap-4">
                            <div className="w-10 h-10 bg-indigo-600 rounded-xl flex items-center justify-center shadow-lg shadow-indigo-500/20">
                                <Target />
                            </div>
                            <div>
                                <h1 className="font-black text-lg tracking-tighter uppercase italic leading-none">The Link Studio</h1>
                                <div className="flex items-center gap-2 text-[9px] font-bold text-indigo-400 uppercase tracking-[0.2em] mt-1">
                                    <span className="relative flex h-2 w-2">
                                        <span className="animate-ping absolute inline-flex h-full w-full rounded-full bg-red-400 opacity-75"></span>
                                        <span className="relative inline-flex rounded-full h-2 w-2 bg-red-500"></span>
                                    </span>
                                    Web Deployment Mode
                                </div>
                            </div>
                        </div>
                        <div className="flex items-center gap-6">
                            <div className="flex items-center gap-3 bg-black/40 border border-slate-800 px-4 py-2 rounded-full">
                                <span className="text-[10px] font-black text-slate-500 uppercase tracking-widest">Segment</span>
                                <span className="text-xs font-bold text-indigo-400">{currentSegment + 1} / 6</span>
                            </div>
                        </div>
                    </header>

                    <main className="flex flex-1 overflow-hidden relative">
                        <aside className="w-80 border-r border-slate-800 bg-[#0f172a] p-6 flex flex-col gap-6 overflow-y-auto">
                            <div className="p-4 bg-slate-900 border border-slate-800 rounded-2xl">
                                <h3 className="font-bold text-sm mb-2">{segments[currentSegment].title}</h3>
                                <p className="text-xs text-slate-400 leading-relaxed italic">"{segments[currentSegment].goals}"</p>
                            </div>
                            <div className="space-y-3">
                                {segments[currentSegment].cueCards.map((card, i) => (
                                    <div key={i} className="p-4 bg-slate-800/40 rounded-xl border border-slate-700/50 text-xs font-medium text-slate-300">
                                        {card}
                                    </div>
                                ))}
                            </div>
                            <div className="mt-auto pt-6 flex justify-between gap-4">
                                <button onClick={() => setCurrentSegment(Math.max(0, currentSegment - 1))} className="flex-1 p-3 bg-slate-800 rounded-xl"><ChevronLeft /></button>
                                <button onClick={() => setCurrentSegment(Math.min(segments.length - 1, currentSegment + 1))} className="flex-1 p-3 bg-slate-800 rounded-xl"><ChevronRight /></button>
                            </div>
                        </aside>

                        <section className="flex-1 flex flex-col bg-black relative">
                            <div className="flex-1 overflow-y-auto p-12 space-y-10 custom-scrollbar">
                                {chatHistory.length === 0 && !podcastThumbnail && (
                                    <div className="h-full flex flex-col items-center justify-center text-center">
                                        <div className="w-24 h-24 bg-indigo-600 rounded-full flex items-center justify-center mb-8"><Mic size={40} /></div>
                                        <h2 className="text-3xl font-black mb-4">STUDIO IS LIVE</h2>
                                        <button onClick={generateVisualTheme} className="flex items-center gap-2 px-4 py-2 bg-slate-800 rounded-full text-xs font-bold"><ImageIcon /> Generate Theme</button>
                                    </div>
                                )}
                                {podcastThumbnail && chatHistory.length === 0 && (
                                    <div className="h-full flex flex-col items-center justify-center text-center relative p-8">
                                        <img src={podcastThumbnail} className="max-w-md rounded-3xl shadow-2xl border border-slate-800 mb-8" />
                                        <button onClick={() => setPodcastThumbnail(null)} className="text-xs text-slate-400">Reset Visual</button>
                                    </div>
                                )}
                                {chatHistory.map((msg, i) => (
                                    <div key={i} className={`flex ${msg.role === 'host' ? 'justify-end' : 'justify-start'}`}>
                                        <div className={`max-w-2xl w-full p-6 rounded-3xl ${msg.role === 'host' ? 'bg-indigo-600' : 'bg-slate-900'}`}>
                                            <div className="text-[9px] uppercase font-black tracking-widest mb-3 opacity-60">
                                                {msg.role === 'host' ? 'HOST' : 'COACH'}
                                            </div>
                                            <div className="text-[15px] leading-relaxed whitespace-pre-wrap">{msg.text}</div>
                                        </div>
                                    </div>
                                ))}
                                {isProcessing && <div className="text-center text-indigo-500 animate-pulse text-xs font-bold">RECORDING RESPONSE...</div>}
                            </div>

                            <audio ref={audioRef} src={audioUrl} autoPlay />

                            <div className="p-8 border-t border-slate-900 bg-slate-950/80">
                                <div className="max-w-4xl mx-auto flex flex-col items-center gap-8">
                                    <button 
                                        onClick={toggleRecording}
                                        className={`w-20 h-20 rounded-full flex items-center justify-center shadow-2xl transition-all ${isRecording ? 'bg-red-500' : 'bg-indigo-600'}`}
                                    >
                                        {isRecording ? <MicOff /> : <Mic />}
                                    </button>
                                    <div className="text-[10px] text-slate-500 tracking-[0.2em] uppercase font-black">
                                        {transcript || "Click Mic to begin rehearsal"}
                                    </div>
                                </div>
                            </div>
                        </section>
                    </main>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
